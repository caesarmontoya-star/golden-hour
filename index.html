<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Golden Hour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fff8f0; --header-bg: #ffffff; --surface: #ffffff; --border: #ede0d4;
  --accent: #e8650a; --accent-light: #ff7a1f; --accent-bg: #fff3ec;
  --text: #1a1008; --text-2: #7a5c44; --text-3: #b8997e;
  --green: #1a8c45; --green-bg: #edfaf3; --green-border: #86c99a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); }
.header { padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--header-bg); }
.grid { padding: 12px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 90px; }
.card { background: var(--surface); border-radius: 14px; padding: 14px 16px; border: 1.5px solid var(--border); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.card-name { font-size: 15px; font-weight: 600; color: var(--text); }
.card-address { display: block; font-size: 12px; color: var(--accent); text-decoration: none; margin-bottom: 8px; font-weight: 500; }
.divider { border-top: 1px solid #f0e8e0; margin: 8px 0; }
.hours { font-size: 12px; color: var(--text-2); margin-bottom: 7px; font-weight: 500; }
.specials { list-style: none; }
.specials li { font-size: 13px; color: #3d2a1a; padding: 2px 0 2px 14px; line-height: 1.55; position: relative; }
.specials li::before { content: ""; position: absolute; left: 2px; top: 9px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent-light); opacity: 0.6; }

/* New Share Button Styles */
.share-btn {
  background: #f5f0eb; border: none; border-radius: 8px;
  padding: 6px 12px; font-size: 11px; font-weight: 600;
  color: var(--text-2); cursor: pointer; transition: background 0.2s;
}
.share-btn:active { background: var(--border); }
</style>
</head>
<body>

<div class="header"><h1>Golden Hour</h1></div>
<div class="grid"></div>

<script>
// --- Dynamic Loading ---
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const response = await fetch('./data.json');
        const venues = await response.json();
        renderVenues(venues);
    } catch (err) {
        console.error("Failed to load venues:", err);
    }
});

// --- Share Logic ---
async function shareVenue(venue) {
    const shareData = {
        title: `Happy Hour at ${venue.Name}`,
        text: `Check out the deals at ${venue.Name}: ${venue.specials.join(', ')}`,
        url: window.location.href
    };

    if (navigator.share) {
        try { await navigator.share(shareData); } catch (err) { console.log('Share cancelled', err); }
    } else {
        const textToCopy = `${shareData.title}: ${shareData.text} - ${shareData.url}`;
        navigator.clipboard.writeText(textToCopy).then(() => alert("Deal details copied!"));
    }
}

// --- Render Logic ---
function renderVenues(venues) {
    const grid = document.querySelector('.grid');
    grid.innerHTML = ''; 
    
    venues.forEach(v => {
        const card = document.createElement('div');
        card.className = 'card';
        
        // Escape JSON for the onclick attribute
        const venueJson = JSON.stringify(v).replace(/"/g, '&quot;');
        
        card.innerHTML = `
            <div class="card-top">
                <div class="card-name">${v.Name}</div>
                <button class="share-btn" onclick="shareVenue(${venueJson})">Share</button>
            </div>
            <a href="#" class="card-address">${v.Address}</a>
            <div class="divider"></div>
            <div class="hours">${v.Hours}</div>
            <ul class="specials">
                ${v.specials.map(s => `<li>${s}</li>`).join('')}
            </ul>
        `;
        grid.appendChild(card);
    });
}
</script>
</body>
</html>
