<style>
:root {
  --bg: #fff8f0; --header-bg: #ffffff; --surface: #ffffff; --border: #ede0d4;
  --border-open: #86c99a; --accent: #e8650a; --accent-light: #ff7a1f;

.header-title { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }

.fav-btn.is-fav { color: var(--orange); }

.divider { border: none; border-top: 1px solid #f0e8e0; margin: 8px 0; }
.hours { font-size: 12px; color: var(--text-2); margin-bottom: 7px; font-weight: 500; }

.share-btn { background: #f5f0eb; border: none; border-radius: 8px; padding: 4px 8px; font-size: 10px; font-weight: 600; color: var(--text-2); cursor: pointer; }
.share-btn:active { background: var(--border); }

.lucky-btn:active { transform: translateX(-50%) scale(0.95); }
.lucky-badge { background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; }
.crawl-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; backdrop-filter: blur(4px); }
.crawl-overlay.is-open { display: flex; align-items: flex-end; justify-content: center; }

.crawl-sheet { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 0 0 32px 0; }
